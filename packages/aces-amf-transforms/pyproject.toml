# SPDX-License-Identifier: Apache-2.0
[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aces-amf-transforms"
version = "0.1.0"
description = "ACES transform URN registry for aces-amf-lib"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "aces-amf-lib>=0.1.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
aces_amf_transforms = ["data/*.json"]

[project.entry-points."aces_amf.validators"]
transform_id = "aces_amf_transforms.validator:TransformIdValidator"

[tool.uv.sources]
aces-amf-lib = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]

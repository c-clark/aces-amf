# SPDX-License-Identifier: Apache-2.0
[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aces-transforms"
version = "0.1.0"
description = "ACES transform URN registry — lookup, validation, and version mapping"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = []

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
aces_transforms = ["data/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]

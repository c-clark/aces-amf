# SPDX-License-Identifier: Apache-2.0
[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aces-transforms"
version = "0.1.0"
description = "ACES transform URN registry — lookup, validation, and version mapping"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = ["aces-common>=0.1.0"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["aces.transforms*"]

[tool.setuptools.package-data]
"aces.transforms" = ["data/*.json"]

[tool.uv.sources]
aces-common = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]

# SPDX-License-Identifier: Apache-2.0
[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aces-amf-lib"
version = "0.1.0"
description = "Reference library for reading, writing, and validating ACES Metadata Files (AMF)"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "lxml>=4.9.0",
    "xsdata[lxml]>=24.0.0",
    "xsdata-pydantic>=24.5",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
aces_amf_lib = ["data/amf-schema/**/*.xsd"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 140
